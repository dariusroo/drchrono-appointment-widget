<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YooshMD — Book Your Consultation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:           #FFFDF5;
      --surface:      #FFFDF5;
      --soft:         #EBDDCF;
      --soft2:        #D4C1B0;
      --border:       #D4C1B0;
      --border2:      #7D4E4E;
      --text:         #4A0E0E;
      --text2:        #4A0E0E;
      --muted:        #7D4E4E;
      --accent:       #4A0E0E;
      --accent-light: #4A0E0E18;
      --accent2:      #3a0b0b;
      --teal:         #7D4E4E;
      --teal-soft:    #7D4E4E20;
      --warn:         #e76f51;
    }
    html, body, #root {
      min-height: 100%;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    body { overflow-y: auto; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .step-anim { animation: fadeUp 0.35s cubic-bezier(.22,.68,0,1.1) both; }

    .field {
      background: var(--soft);
      border: 1.5px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 12px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      resize: none;
    }
    .field:focus { border-color: var(--accent); background: #fff; }
    .field::placeholder { color: var(--muted); }

    .card-sel { transition: all 0.18s ease; cursor: pointer; }
    .card-sel:hover { border-color: var(--accent) !important; box-shadow: 0 4px 16px rgba(74,14,14,0.1); transform: translateY(-1px); }

    .slot-btn { transition: all 0.15s ease; cursor: pointer; }
    .slot-btn:hover { border-color: var(--accent) !important; background: var(--accent-light) !important; }

    .btn-primary { transition: all 0.2s ease; }
    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(74,14,14,0.25); }
    .btn-back { transition: all 0.2s ease; }
    .btn-back:hover { background: var(--soft2) !important; }

    .cal-day { transition: all 0.12s; border-radius: 50%; cursor: pointer; }
    .cal-day:hover { background: var(--accent-light) !important; }

    /* Progress bar at very top */
    .progress-bar { height: 3px; background: var(--border); border-radius: 0; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--teal)); border-radius: 3px; transition: width 0.4s ease; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect } = React;

  const API = 'https://yooshmd-api.vercel.app';

  const DOCTOR = { first: "Darius", last: "Roohani", cred: "MD", bio: "Board-certified in Internal Medicine & Obesity Medicine" };

  // Static display fields merged onto live profile data
  const PROFILE_META = {
    default: { price: "$99", icon: "◆", desc: "Comprehensive first visit — medical history, goals, and personalized weight loss plan.", badge: "" },
  };

  const STATES = ["California", "Nevada"];
  const GENDERS = ["Male", "Female", "Other"];

  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const pad = n => String(n).padStart(2,"0");
  const fmt = (y,m,d) => `${y}-${pad(m+1)}-${pad(d)}`;
  const prettyDate = s => {
    if (!s) return "";
    const [y,m,d] = s.split("-");
    return `${MONTHS[+m-1]} ${+d}, ${y}`;
  };

  const STEPS = ["Visit Type", "Schedule", "Your Info", "Confirm"];

  // ── Wordmark ───────────────────────────────────────────────────────────────
  function Logo() {
    return (
      <div style={{display:"flex",alignItems:"baseline",gap:0,lineHeight:1}}>
        <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:600,color:var_accent(),letterSpacing:"-0.01em"}}>Yoosh</span>
        <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:300,fontStyle:"italic",color:var_text(),letterSpacing:"-0.01em"}}>MD</span>
      </div>
    );
  }
  function var_accent() { return "var(--accent)"; }
  function var_text() { return "var(--text)"; }

  // ── Step Bar ───────────────────────────────────────────────────────────────
  function StepBar({ current }) {
    return (
      <div style={{marginBottom:32}}>
        <div style={{display:"flex",alignItems:"center",gap:0,marginBottom:8}}>
          {STEPS.map((s,i) => (
            <React.Fragment key={i}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <div style={{
                  width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:11,fontWeight:600,
                  background:i<current?"var(--accent)":i===current?"var(--text)":"transparent",
                  border:i<current?"2px solid var(--accent)":i===current?"2px solid var(--text)":"2px solid var(--border2)",
                  color:i<=current?"#fff":"var(--muted)",
                  transition:"all 0.3s",
                }}>
                  {i<current ? "✓" : i+1}
                </div>
                <span style={{fontSize:10,fontWeight:500,letterSpacing:"0.05em",textTransform:"uppercase",color:i===current?"var(--accent)":i<current?"var(--text2)":"var(--muted)",whiteSpace:"nowrap"}}>
                  {s}
                </span>
              </div>
              {i<STEPS.length-1 && (
                <div style={{flex:1,height:1,marginBottom:18,background:i<current?"var(--accent)":"var(--border)",transition:"background 0.4s",margin:"0 8px",marginBottom:18}}/>
              )}
            </React.Fragment>
          ))}
        </div>
      </div>
    );
  }

  // ── Calendar ───────────────────────────────────────────────────────────────
  function Calendar({ sel, onSel, y, m, onPrev, onNext, availableDates=[] }) {
    const days = new Date(y,m+1,0).getDate();
    const firstDay = new Date(y,m,1).getDay();
    const today = new Date();
    return (
      <div style={{background:"var(--soft)",borderRadius:14,padding:18,border:"1.5px solid var(--border)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <button onClick={onPrev} style={{background:"none",border:"1.5px solid var(--border)",color:"var(--muted)",borderRadius:8,width:28,height:28,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
          <span style={{fontSize:14,fontWeight:600,color:"var(--text)",letterSpacing:"0.01em"}}>{MONTHS[m]} {y}</span>
          <button onClick={onNext} style={{background:"none",border:"1.5px solid var(--border)",color:"var(--muted)",borderRadius:8,width:28,height:28,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
          {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=>(
            <div key={d} style={{fontSize:10,color:"var(--muted)",textAlign:"center",padding:"3px 0",fontWeight:600,letterSpacing:"0.04em"}}>{d}</div>
          ))}
          {Array(firstDay).fill(null).map((_,i)=><div key={"b"+i}/>)}
          {Array.from({length:days},(_,i)=>i+1).map(d=>{
            const ds=fmt(y,m,d);
            const isPast=new Date(y,m,d)<new Date(today.getFullYear(),today.getMonth(),today.getDate());
            const isSel=sel===ds;
            const isTdy=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
            const dow=new Date(y,m,d).getDay();
            const isWknd=dow===0; // Sundays only — Saturdays now open
            const hasSlots=availableDates.includes(ds);
            return (
              <div key={d} className={isPast||isWknd||!hasSlots?"":"cal-day"} onClick={()=>!isPast&&!isWknd&&hasSlots&&onSel(ds)} style={{
                fontSize:12,textAlign:"center",padding:"6px 0",borderRadius:"50%",
                background:isSel?"var(--accent)":"transparent",
                color:isSel?"#fff":isPast||isWknd||!hasSlots?"#888":"var(--text)",
                fontWeight:isSel?700:isPast||isWknd||!hasSlots?400:500,
                cursor:isPast||isWknd||!hasSlots?"default":"pointer",
                outline:isTdy&&!isSel?"2px solid var(--accent)":"none",
                outlineOffset:"1px",
                opacity:isPast||isWknd||!hasSlots?0.35:1,
              }}>{d}</div>
            );
          })}
        </div>
        <div style={{marginTop:10,fontSize:11,color:"var(--muted)",textAlign:"center"}}>Weekdays only · CA & NV patients</div>
      </div>
    );
  }

  // ── Main App ───────────────────────────────────────────────────────────────
  function App() {
    const [step,setStep]=useState(0);
    const [animKey,setAnimKey]=useState(0);
    const [profiles,setProfiles]=useState([]);
    const [profile,setProfile]=useState(null);
    const [date,setDate]=useState("");
    const [time,setTime]=useState("");        // full ISO datetime for API
    const [timeDisplay,setTimeDisplay]=useState(""); // "9:00 AM" for UI
    const [cy,setCy]=useState(new Date().getFullYear());
    const [cm,setCm]=useState(new Date().getMonth());
    const [slots,setSlots]=useState([]);
    const [slotsLoading,setSlotsLoading]=useState(false);
    const [availableDates,setAvailableDates]=useState([]);
    const [state,setState]=useState("California");
    const [form,setForm]=useState({first:"",last:"",dob:"",email:"",phone:"",gender:"",address:"",city:"",zip:"",reason:""});
    const [done,setDone]=useState(false);
    const [submitting,setSubmitting]=useState(false);
    const [submitError,setSubmitError]=useState("");
    const doctor=DOCTOR;

    // Fetch appointment profiles on mount
    useEffect(()=>{
      fetch(`${API}/api/appointment_profiles`)
        .then(r=>r.json())
        .then(data=>{
          const meta = PROFILE_META.default;
          const list = (data.results||[]).map(p=>({...p,...meta}));
          setProfiles(list);
          if(list.length>0) setProfile(list[0]);
        })
        .catch(()=>{
          const fallback = {id:969506,name:"Initial Consultation",duration:30,...PROFILE_META.default};
          setProfiles([fallback]);
          setProfile(fallback);
        });
    },[]);

    // Fetch available dates whenever calendar month changes
    useEffect(()=>{
      fetch(`${API}/api/slots/available-dates?year=${cy}&month=${cm+1}`)
        .then(r=>r.json())
        .then(data=>setAvailableDates(data.availableDates||[]))
        .catch(()=>setAvailableDates([]));
    },[cy,cm]);

    // Fetch available slots whenever date changes
    useEffect(()=>{
      if(!date) return;
      setSlotsLoading(true);
      setTime(""); setTimeDisplay("");
      fetch(`${API}/api/slots?date=${date}`)
        .then(r=>r.json())
        .then(data=>{ setSlots(data.slots||[]); setSlotsLoading(false); })
        .catch(()=>{ setSlots([]); setSlotsLoading(false); });
    },[date]);

    // Autofill form when first + last + DOB are all entered
    useEffect(()=>{
      if(!form.first||!form.last||!form.dob) return;
      fetch(`${API}/api/patients?first_name=${encodeURIComponent(form.first)}&last_name=${encodeURIComponent(form.last)}&date_of_birth=${form.dob}`)
        .then(r=>r.json())
        .then(data=>{
          const p = data.results?.[0];
          if(!p) return;
          setForm(f=>({...f,
            email: p.email||f.email,
            phone: p.cell_phone||p.home_phone||f.phone,
            gender: p.gender||f.gender,
            address: p.address||f.address,
            city: p.city||f.city,
            zip: p.zip_code||f.zip,
          }));
        })
        .catch(()=>{});
    },[form.first, form.last, form.dob]);

    const go=s=>{setAnimKey(k=>k+1);setStep(s);};
    const prevM=()=>cm===0?(setCy(y=>y-1),setCm(11)):setCm(m=>m-1);
    const nextM=()=>cm===11?(setCy(y=>y+1),setCm(0)):setCm(m=>m+1);

    const canStep0=!!profile;
    const canStep1=!!(date&&time&&state);
    const canStep2=!!(form.first&&form.last&&form.email&&form.phone&&form.dob&&form.gender&&form.address&&form.city&&form.zip);
    const progressPct = [0,25,50,75,100][Math.min(step+(done?1:0),4)];

    async function handleConfirm() {
      setSubmitting(true); setSubmitError("");
      try {
        // 1. Find or create patient
        const stateAbbr = state==="California"?"CA":"NV";
        const patientPayload = {first_name:form.first,last_name:form.last,date_of_birth:form.dob,gender:form.gender,email:form.email,cell_phone:form.phone,doctor:523137,address:form.address,city:form.city,state:stateAbbr,zip_code:form.zip};
        let patientId;
        const search = await fetch(`${API}/api/patients?first_name=${encodeURIComponent(form.first)}&last_name=${encodeURIComponent(form.last)}&date_of_birth=${form.dob}`);
        const searchData = await search.json();
        const existing = searchData.results?.[0];
        if (existing) {
          patientId = existing.id;
          // Update address and contact info for existing patient
          await fetch(`${API}/api/patients/${patientId}`,{
            method:'PATCH', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({address:form.address,city:form.city,state:stateAbbr,zip_code:form.zip,email:form.email,cell_phone:form.phone}),
          });
        } else {
          const cr = await fetch(`${API}/api/patients`,{
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify(patientPayload),
          });
          const newPt = await cr.json();
          if(!cr.ok) throw new Error(JSON.stringify(newPt));
          patientId = newPt.id;
        }
        // 2. Book appointment
        const ar = await fetch(`${API}/api/appointments`,{
          method:'POST', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({doctor:523137,office:555620,patient:patientId,scheduled_time:time,exam_room:1,duration:profile.duration,profile:profile.id,reason:form.reason||profile.name}),
        });
        const appt = await ar.json();
        if(!ar.ok) throw new Error(JSON.stringify(appt));
        setDone(true);
      } catch(err) {
        setSubmitError("Something went wrong. Please try again or call (909) 293-8095.");
        console.error(err);
      } finally { setSubmitting(false); }
    }

    // ── Confirmed ────────────────────────────────────────────────────────────
    if (done) return (
      <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"16px 32px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <Logo/>
        </div>
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:32}}>
          <div style={{maxWidth:500,width:"100%",textAlign:"center"}}>
            <div style={{width:64,height:64,borderRadius:"50%",background:"var(--accent-light)",border:"2px solid var(--accent)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 24px",fontSize:26}}>✓</div>
            <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:32,fontWeight:600,marginBottom:8,color:"var(--text)"}}>You're all set, {form.first}!</h2>
            <p style={{color:"var(--muted)",fontSize:14,marginBottom:32,lineHeight:1.6}}>
              Your consultation has been booked. Dr. Roohani will see you soon. Check your email for a confirmation and video visit link.
            </p>
            <div style={{background:"var(--soft)",borderRadius:16,border:"1.5px solid var(--border)",overflow:"hidden",marginBottom:28,textAlign:"left"}}>
              {[
                ["Visit type", profile?.name],
                ["Date & time", `${prettyDate(date)} at ${timeDisplay}`],
                ["Provider", `Dr. ${doctor.first} ${doctor.last}, ${doctor.cred}`],
                ["State", state],
                ["Confirmation to", form.email],
              ].map(([l,v],i,arr)=>(
                <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 20px",borderBottom:i<arr.length-1?"1px solid var(--border)":"none"}}>
                  <span style={{fontSize:11,color:"var(--muted)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>{l}</span>
                  <span style={{fontSize:14,fontWeight:500,color:"var(--text)",textAlign:"right",maxWidth:"60%"}}>{v}</span>
                </div>
              ))}
            </div>
            <div style={{background:"var(--soft)",border:"1px solid var(--border)",borderRadius:12,padding:"14px 20px",marginBottom:28,fontSize:13,color:"var(--accent2)",lineHeight:1.6,textAlign:"left"}}>
              <strong>What to expect:</strong> You'll receive a video visit link via email. The visit is 100% online — no commute, no waiting room. You will also receive a link to the OnPatient portal - please fill out the intake forms prior to your visit.
            </div>
            <button className="btn-primary" onClick={()=>{setDone(false);setStep(0);setProfile(null);setDate("");setTime("");setTimeDisplay("");setState("");setSlots([]);setSubmitError("");setForm({first:"",last:"",dob:"",email:"",phone:"",gender:"",address:"",city:"",zip:"",reason:""});}} style={{background:"var(--accent)",color:"#fff",border:"none",borderRadius:10,padding:"13px 32px",fontSize:14,fontWeight:500,cursor:"pointer"}}>
              Book Another Visit
            </button>
          </div>
        </div>
      </div>
    );

    return (
      <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column"}}>

        {/* Progress bar */}
        <div className="progress-bar">
          <div className="progress-fill" style={{width:`${progressPct}%`}}/>
        </div>

        {/* Nav */}
        <div style={{padding:"16px 32px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between",background:"var(--bg)",position:"sticky",top:0,zIndex:10}}>
          <Logo/>
          <div style={{fontSize:12,color:"var(--muted)",fontWeight:500}}>
            100% Online · CA &amp; NV
          </div>
        </div>

        {/* Hero banner — only on step 0 */}
        {step===0 && (
          <div style={{background:"linear-gradient(135deg,#3a0b0b 0%,#4A0E0E 100%)",padding:"28px 32px",textAlign:"center"}}>
            <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:13,fontStyle:"italic",color:"#EBDDCF",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6}}>Medical weight loss</p>
            <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:32,fontWeight:300,color:"#ffffff",letterSpacing:"-0.01em",lineHeight:1.25,marginBottom:6}}>
              Start with medication. <em style={{fontStyle:"italic",color:"#EBDDCF"}}>Finish without it.</em>
            </h1>
            <p style={{fontSize:13,color:"#D4C1B0",fontWeight:300}}>Ozempic® · Semaglutide · Tirzepatide · Physician-led</p>
          </div>
        )}

        {/* Widget */}
        <div style={{maxWidth:680,margin:"0 auto",width:"100%",padding:"36px 24px 60px"}}>
          <StepBar current={step}/>

          <div key={animKey} className="step-anim">

            {/* ── Step 0: Visit Type ──────────────────────────────────────── */}
            {step===0 && (
              <div>
                <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:600,marginBottom:4}}>Schedule your initial consultation</h2>
                <p style={{color:"var(--muted)",fontSize:13,marginBottom:24,lineHeight:1.5}}>Click the Initial Consultation button below and choose a time.</p>

                {/* Doctor pill */}
                <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:"var(--soft)",borderRadius:12,border:"1.5px solid var(--border)",marginBottom:20}}>
                  <div style={{width:40,height:40,borderRadius:"50%",background:"linear-gradient(135deg,#EBDDCF,#D4C1B0)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:"var(--accent2)",flexShrink:0,fontFamily:"'Cormorant Garamond',serif"}}>DR</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:14}}>Dr. Darius Roohani, {doctor.cred}</div>
                    <div style={{fontSize:12,color:"var(--muted)",marginTop:1}}>{doctor.bio}</div>
                  </div>
                </div>

                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  {profiles.map(p=>(
                    <div key={p.id} className="card-sel" onClick={()=>setProfile(p)} style={{
                      display:"flex",alignItems:"flex-start",gap:16,padding:"18px 20px",
                      borderRadius:14,
                      border:profile?.id===p.id?"2px solid var(--accent)":"1.5px solid var(--border)",
                      background:profile?.id===p.id?"var(--accent-light)":"var(--soft)",
                      position:"relative",
                    }}>
                      <div style={{fontSize:18,color:profile?.id===p.id?"var(--accent)":"var(--muted)",marginTop:2,flexShrink:0}}>{p.icon}</div>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                          <span style={{fontWeight:600,fontSize:15,color:"var(--text)"}}>{p.name}</span>
                          {p.badge && <span style={{fontSize:10,fontWeight:700,background:"var(--accent)",color:"#fff",borderRadius:20,padding:"2px 8px",letterSpacing:"0.04em",textTransform:"uppercase"}}>{p.badge}</span>}
                        </div>
                        <div style={{fontSize:13,color:"var(--muted)",lineHeight:1.5,marginBottom:6}}>{p.desc}</div>
                        <div style={{display:"flex",gap:12,fontSize:12}}>
                          <span style={{color:"var(--accent)",fontWeight:600}}>{p.price}</span>
                          <span style={{color:"var(--muted)"}}>·</span>
                          <span style={{color:"var(--muted)"}}>{p.duration} min</span>
                        </div>
                      </div>
                      {profile?.id===p.id && <div style={{width:22,height:22,borderRadius:"50%",background:"var(--accent)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>✓</div>}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ── Step 1: Schedule ─────────────────────────────────────────── */}
            {step===1 && (
              <div>
                <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:600,marginBottom:4}}>Pick a date &amp; time</h2>
                <p style={{color:"var(--muted)",fontSize:13,marginBottom:24}}>All visits are 100% online via video call.</p>

                {/* State selector */}
                <div style={{marginBottom:20}}>
                  <label style={{fontSize:11,fontWeight:600,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.07em",display:"block",marginBottom:7}}>Your state</label>
                  <div style={{display:"flex",gap:10}}>
                    {STATES.map(s=>(
                      <div key={s} onClick={()=>setState(s)} style={{
                        flex:1,padding:"12px 16px",borderRadius:10,textAlign:"center",fontSize:14,fontWeight:600,
                        border:state===s?"2px solid var(--accent)":"1.5px solid var(--border)",
                        background:state===s?"var(--accent)":"var(--soft)",
                        color:state===s?"#fff":"var(--muted)",
                        cursor:"pointer",transition:"all 0.15s",
                      }}>{s}</div>
                    ))}
                  </div>
                </div>

                <div style={{display:"grid",gridTemplateColumns:"1fr",gap:20}}>
                  <div>
                    <label style={{fontSize:11,fontWeight:600,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.07em",display:"block",marginBottom:10}}>Date</label>
                    <Calendar sel={date} onSel={d=>{setDate(d);setTime("");}} y={cy} m={cm} onPrev={prevM} onNext={nextM} availableDates={availableDates}/>
                  </div>
                  <div>
                    <label style={{fontSize:11,fontWeight:600,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.07em",display:"block",marginBottom:10}}>Time (PT)</label>
                    {!date ? (
                      <div style={{background:"var(--soft)",borderRadius:14,padding:24,border:"1.5px solid var(--border)",textAlign:"center",height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8}}>
                        <div style={{fontSize:24,opacity:0.25}}>◇</div>
                        <p style={{color:"var(--muted)",fontSize:12}}>Select a date first</p>
                      </div>
                    ) : slotsLoading ? (
                      <div style={{background:"var(--soft)",borderRadius:14,padding:24,border:"1.5px solid var(--border)",textAlign:"center",height:"100%",display:"flex",alignItems:"center",justifyContent:"center"}}>
                        <p style={{color:"var(--muted)",fontSize:12}}>Loading availability…</p>
                      </div>
                    ) : slots.length===0 ? (
                      <div style={{background:"var(--soft)",borderRadius:14,padding:24,border:"1.5px solid var(--border)",textAlign:"center",height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8}}>
                        <div style={{fontSize:24,opacity:0.25}}>◇</div>
                        <p style={{color:"var(--muted)",fontSize:12}}>No availability — try another date</p>
                      </div>
                    ) : (
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,maxHeight:260,overflowY:"auto"}}>
                        {slots.map(s=>(
                          <div key={s.datetime} className="slot-btn" onClick={()=>{setTime(s.datetime);setTimeDisplay(s.display);}} style={{
                            padding:"10px 6px",borderRadius:9,fontSize:12,fontWeight:500,textAlign:"center",
                            background:time===s.datetime?"var(--accent)":"var(--soft)",
                            color:time===s.datetime?"#fff":"var(--text)",
                            border:time===s.datetime?"2px solid var(--accent)":"1.5px solid var(--border)",
                            cursor:"pointer",
                          }}>{s.display}</div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
                {date&&time&&(
                  <div style={{marginTop:16,padding:"11px 16px",background:"var(--soft)",borderRadius:10,border:"1px solid var(--border)",fontSize:13,color:"var(--accent2)",fontWeight:500}}>
                    ✓ &nbsp;{prettyDate(date)} at {timeDisplay} PT · {state}
                  </div>
                )}
              </div>
            )}

            {/* ── Step 2: Your Info ────────────────────────────────────────── */}
            {step===2 && (
              <div>
                <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:600,marginBottom:4}}>Your information</h2>
                <p style={{color:"var(--muted)",fontSize:13,marginBottom:24,lineHeight:1.5}}>
                  Used to confirm your appointment and create your patient record. Protected under HIPAA.
                </p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
                  {[["First name","first","","text"],["Last name","last","","text"]].map(([label,k,ph,type])=>(
                    <div key={k} style={{display:"flex",flexDirection:"column",gap:6}}>
                      <label style={{fontSize:11,fontWeight:600,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</label>
                      <input className="field" type={type} placeholder={ph} value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})}/>
                    </div>
                  ))}
                  {[["Date of birth","dob","","date"],["Phone","phone","","tel"]].map(([label,k,ph,type])=>(
                    <div key={k} style={{gridColumn:"1/-1",display:"flex",flexDirection:"column",gap:6}}>
                      <label style={{fontSize:11,fontWeight:600,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</label>
                      <input className="field" type={type} placeholder={ph} value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})}/>
                    </div>
                  ))}
                  <div style={{gridColumn:"1/-1",display:"flex",flexDirection:"column",gap:6}}>
                    <label style={{fontSize:11,fontWeight:600,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.06em"}}>Biological sex</label>
                    <div style={{display:"flex",gap:10}}>
                      {GENDERS.map(g=>(
                        <div key={g} onClick={()=>setForm({...form,gender:g})} style={{
                          flex:1,padding:"10px 0",borderRadius:10,textAlign:"center",fontSize:13,fontWeight:500,
                          border:form.gender===g?"2px solid var(--accent)":"1.5px solid var(--border)",
                          background:form.gender===g?"var(--accent-light)":"var(--soft)",
                          color:form.gender===g?"var(--accent)":"var(--text2)",cursor:"pointer",transition:"all 0.15s",
                        }}>{g}</div>
                      ))}
                    </div>
                  </div>
                  <div style={{gridColumn:"1/-1",display:"flex",flexDirection:"column",gap:6}}>
                    <label style={{fontSize:11,fontWeight:600,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.06em"}}>Email</label>
                    <input className="field" type="email" placeholder="" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/>
                  </div>
                  <div style={{gridColumn:"1/-1",display:"flex",flexDirection:"column",gap:6}}>
                    <label style={{fontSize:11,fontWeight:600,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.06em"}}>Street address</label>
                    <input className="field" type="text" placeholder="" value={form.address} onChange={e=>setForm({...form,address:e.target.value})}/>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    <label style={{fontSize:11,fontWeight:600,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.06em"}}>City</label>
                    <input className="field" type="text" placeholder="" value={form.city} onChange={e=>setForm({...form,city:e.target.value})}/>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    <label style={{fontSize:11,fontWeight:600,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.06em"}}>ZIP code</label>
                    <input className="field" type="text" placeholder="" value={form.zip} onChange={e=>setForm({...form,zip:e.target.value})}/>
                  </div>
                  <div style={{gridColumn:"1/-1",display:"flex",flexDirection:"column",gap:6}}>
                    <label style={{fontSize:11,fontWeight:600,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.06em"}}>
                      What are your weight loss goals? <span style={{fontWeight:400,textTransform:"none",fontSize:12}}>(optional)</span>
                    </label>
                    <textarea className="field" rows={3} placeholder="" value={form.reason} onChange={e=>setForm({...form,reason:e.target.value})}/>
                  </div>
                </div>
                <div style={{fontSize:12,color:"var(--muted)",background:"var(--soft)",padding:"10px 14px",borderRadius:9,border:"1px solid var(--border)",lineHeight:1.6}}>
                  🔒 &nbsp;Your information is encrypted and protected under HIPAA. We never sell your data.
                </div>
              </div>
            )}

            {/* ── Step 3: Confirm ──────────────────────────────────────────── */}
            {step===3 && (
              <div>
                <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:600,marginBottom:4}}>Review &amp; confirm</h2>
                <p style={{color:"var(--muted)",fontSize:13,marginBottom:24}}>Please review your appointment details before confirming.</p>

                <div style={{background:"var(--soft)",borderRadius:16,border:"1.5px solid var(--border)",overflow:"hidden",marginBottom:20}}>
                  {[
                    ["Visit type", `${profile?.name} — ${profile?.price}`],
                    ["Date", prettyDate(date)],
                    ["Time", `${timeDisplay} PT`],
                    ["State", state],
                    ["Provider", `Dr. ${doctor.first} ${doctor.last}, ${doctor.cred}`],
                    ["Format", "Video visit (link sent by email)"],
                    ["Duration", `${profile?.duration} min`],
                    ["Patient", `${form.first} ${form.last}`],
                    ["Confirmation to", form.email],
                  ].map(([l,v],i,arr)=>(
                    <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 20px",borderBottom:i<arr.length-1?"1px solid var(--border)":"none",flexWrap:"wrap",gap:4}}>
                      <span style={{fontSize:11,color:"var(--muted)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",flexShrink:0}}>{l}</span>
                      <span style={{fontSize:14,fontWeight:500,color:"var(--text)",textAlign:"right"}}>{v}</span>
                    </div>
                  ))}
                </div>

                {profile?.id===201 && (
                  <div style={{background:"var(--soft)",border:"1px solid var(--border)",borderRadius:12,padding:"14px 18px",fontSize:13,color:"var(--accent2)",lineHeight:1.65,marginBottom:16}}>
                    <strong>Your $99 initial consultation includes:</strong> full medical history review, personalized medication recommendation, and your custom weight loss roadmap — including a plan to eventually get off medication.
                  </div>
                )}

                <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.6}}>
                  By confirming, you agree to YooshMD's <a href="https://www.yooshmd.com/terms-of-service" target="_blank" style={{color:"var(--accent)"}}>Terms of Service</a> and <a href="https://www.yooshmd.com/hipaa" target="_blank" style={{color:"var(--accent)"}}>Notice of Privacy Practices</a>.
                </div>
              </div>
            )}

          </div>{/* end step-anim */}

          {/* Nav buttons */}
          <div style={{display:"flex",alignItems:"center",marginTop:36,gap:12}}>
            {step>0 && (
              <button className="btn-back" onClick={()=>go(step-1)} style={{background:"transparent",color:"var(--text2)",border:"1.5px solid var(--border)",borderRadius:10,padding:"12px 20px",fontSize:13,fontWeight:500,cursor:"pointer"}}>
                ← Back
              </button>
            )}
            <div style={{flex:1}}/>
            {step<3 && (
              <button className="btn-primary" disabled={[!canStep0,!canStep1,!canStep2][step]} onClick={()=>{if([canStep0,canStep1,canStep2][step])go(step+1);}} style={{
                background:[canStep0,canStep1,canStep2][step]?"var(--accent)":"var(--border)",
                color:[canStep0,canStep1,canStep2][step]?"#fff":"var(--muted)",
                border:"none",borderRadius:10,padding:"13px 32px",fontSize:13,fontWeight:600,
                cursor:[canStep0,canStep1,canStep2][step]?"pointer":"not-allowed",
                letterSpacing:"0.02em",
              }}>
                {step===0?"Choose a time →":step===1?"Enter your info →":"Review booking →"}
              </button>
            )}
            {step===3 && (
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:10}}>
                {submitError && <div style={{fontSize:12,color:"var(--warn)",textAlign:"right"}}>{submitError}</div>}
                <button className="btn-primary" onClick={handleConfirm} disabled={submitting} style={{background:submitting?"var(--border)":"var(--accent)",color:submitting?"var(--muted)":"#fff",border:"none",borderRadius:10,padding:"13px 36px",fontSize:13,fontWeight:600,cursor:submitting?"not-allowed":"pointer",letterSpacing:"0.02em"}}>
                  {submitting ? "Booking…" : "Confirm appointment ✓"}
                </button>
              </div>
            )}
          </div>

          {/* Trust bar */}
          <div style={{marginTop:40,paddingTop:24,borderTop:"1px solid var(--border)",display:"flex",justifyContent:"center",gap:28,flexWrap:"wrap"}}>
            {["Board-certified MD","HIPAA protected","No insurance needed","100% online"].map(t=>(
              <div key={t} style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:"var(--muted)",fontWeight:500}}>
                <span style={{color:"var(--accent)",fontSize:13}}>✓</span> {t}
              </div>
            ))}
          </div>

        </div>{/* end widget body */}

        {/* Footer */}
        <div style={{borderTop:"1px solid var(--border)",padding:"20px 32px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
          <Logo/>
          <div style={{display:"flex",gap:16,fontSize:11,color:"var(--muted)"}}>
            <a href="https://www.yooshmd.com/hipaa" target="_blank" style={{color:"var(--muted)",textDecoration:"none"}}>Privacy Practices</a>
            <a href="https://www.yooshmd.com/terms-of-service" target="_blank" style={{color:"var(--muted)",textDecoration:"none"}}>Terms</a>
            <a href="https://www.yooshmd.com" target="_blank" style={{color:"var(--muted)",textDecoration:"none"}}>yooshmd.com</a>
          </div>
          <div style={{fontSize:11,color:"var(--muted)"}}>Powered by DrChrono</div>
        </div>

      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
